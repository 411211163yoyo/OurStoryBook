<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/global.css?v=20260720b">
    <link rel="stylesheet" href="css/layout.css?v=20260720b">
    <link rel="stylesheet" href="css/book.css?v=20260720b">
    <link rel="stylesheet" href="css/pages.css?v=20260720b">
    <link rel="stylesheet" href="css/animation.css?v=20260720b">
</head>

<body>

<div class="desk">

    <!-- 書 -->
    <div class="book" id="book">

        <!-- 書本陰影 -->
        <div class="book-shadow"></div>

        <!-- 封底 -->
        <div class="back-cover"></div>

        <!-- 書籤導覽（依 main.js 的 storyPages 自動產生按鈕） -->
        <div class="bookmarks" id="bookmarks"></div>

        <!-- 信紙頁面：由 main.js 依 storyPages 陣列動態產生 -->
        <div class="pages"></div>

        <!-- 封面一定放最後 -->
        <div class="cover">

            <div class="cover-face">

                <div class="cover-border"></div>

                <h1>Our Story</h1>

                <p class="since">Since 2026</p>

            </div>

            <div class="cover-back">
                <p>For every little day</p>
            </div>

        </div>

    </div>

</div>

<script src="js/pageTurn.js?v=20260720b"></script>
<script src="js/main.js?v=20260720b"></script>

</body>
</html>
